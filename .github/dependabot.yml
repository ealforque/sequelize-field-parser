# Dependabot configuration for npm dependencies
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "fix"
      include: "scope"
    ignore:
      - dependency-name: "eslint"
        versions: ["10.x"]
